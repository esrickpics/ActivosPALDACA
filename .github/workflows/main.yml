name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Activos via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            PROJECT_DIR=/home/ssapmcco/Projects/Activos
            STATIC_SITE=/home/ssapmcco/activos.cpaldaca.com
            VENV=/home/ssapmcco/virtualenv/Projects/Activos/3.13/bin/activate

            cd "$PROJECT_DIR"

            echo "Guardando cambios locales temporales..."
            git stash || true

            echo "Trayendo cambios desde GitHub..."
            git pull origin main

            echo "Activando entorno virtual..."
            source "$VENV"

            if [ -f "requirements.txt" ]; then
              echo "Instalando dependencias..."
              pip install -r requirements.txt
            fi

            echo "Aplicando migraciones..."
            python manage.py migrate --noinput

            echo "Recopilando archivos estaticos..."
            python manage.py collectstatic --noinput --clear

            echo "Limpiando sitio estatico anterior..."
            mkdir -p "$STATIC_SITE/static"
            for item in "$STATIC_SITE"/* "$STATIC_SITE"/.[^.]*; do
              [ -e "$item" ] || continue
              base="$(basename "$item")"
              case "$base" in
                .htaccess|.well-known|cgi-bin) ;;
                *) rm -rf "$item" ;;
              esac
            done

            echo "Publicando static en activos.cpaldaca.com..."
            rsync -av --delete "$PROJECT_DIR/staticfiles/" "$STATIC_SITE/static/"

            echo "Reiniciando aplicacion Phusion Passenger..."
            touch "$PROJECT_DIR/passenger_wsgi.py"
